<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Network Scanner Web UI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="hero">
        <div class="hero-copy">
          <h1>Network Scanner & Remote Shutdown</h1>
          <p>Scan your subnet, inspect connected devices, export results, and safely manage authorized systems.</p>
        </div>
        <nav class="site-nav">
          <a href="{{ url_for('index') }}">Home</a>
          <a href="{{ url_for('about') }}">About</a>
          <a href="{{ url_for('help_page') }}">Help</a>
        </nav>
      </header>

      <main class="content">
        {% block content %}{% endblock %}
      </main>

      <footer class="footer">
        <p>Use responsibly. Only scan and control devices you own or are authorized to manage.</p>
      </footer>
    </div>
  </body>
</html>
